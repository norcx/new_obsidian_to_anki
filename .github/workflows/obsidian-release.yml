name: Release Obsidian Plugin

env:
  PLUGIN_NAME: better-obsidian-to-anki

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example 0.2.0 or v0.2.0
        required: true
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: npm

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Validate tag matches manifest version
        run: |
          TAG_VERSION="${tag#v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)."
            exit 1
          fi

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Package
        run: |
          mkdir "${{ env.PLUGIN_NAME }}"
          cp main.js manifest.json styles.css "${{ env.PLUGIN_NAME }}"
          zip -r "${{ env.PLUGIN_NAME }}-${{ env.tag }}.zip" "${{ env.PLUGIN_NAME }}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag }}
          generate_release_notes: true
          draft: true
          files: |
            main.js
            manifest.json
            styles.css
            ${{ env.PLUGIN_NAME }}-${{ env.tag }}.zip
